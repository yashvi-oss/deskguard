version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: deskguard-postgres
    environment:
      POSTGRES_DB: deskguard
      POSTGRES_USER: deskguard_user
      POSTGRES_PASSWORD: deskguard_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deskguard_user -d deskguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: deskguard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
